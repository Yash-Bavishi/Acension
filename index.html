<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascension :: King of the Hill</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="crosshair" style="display: none;"></div>
      <div id="velocity-display" style="display: none;">0 u/s</div>
      <div id="username-display" style="display: none;"></div>
      
      <!-- Pause Overlay -->
      <div id="blocker" style="display: none;">
        <div id="instructions">
          <h2 class="pause-title">GAME PAUSED</h2>
          <p class="pause-subtitle">Click anywhere to resume climbing</p>
        </div>
      </div>

      <!-- Main Menu Overlay -->
      <div id="main-menu">
        <h1 class="logo">ASCENSION</h1>
        <p class="subtitle">Select your climb</p>
        
        <!-- Username Input -->
        <div class="username-input-wrap">
          <input type="text" id="username-input" class="username-input" placeholder="Enter your name" maxlength="20" autocomplete="off" spellcheck="false" />
        </div>

        <!-- Bhop Mode Toggle -->
        <div class="bhop-toggle">
          <span class="toggle-label">BHOP MODE</span>
          <div class="toggle-options">
            <button class="toggle-btn active" id="mode-auto">AUTO &nbsp;<small>SPACE</small></button>
            <button class="toggle-btn" id="mode-manual">MANUAL &nbsp;<small>SCROLL</small></button>
          </div>
        </div>

        <div class="map-container">
          <!-- Classic Map Card -->
          <div class="map-card" id="btn-classic">
            <div class="card-bg classic-bg"></div>
            <div class="card-content">
              <h3>Classic Peak</h3>
              <p>The original jagged, chaotic mountain test.</p>
            </div>
          </div>
          
          <!-- Fuji Map Card -->
          <div class="map-card" id="btn-fuji">
            <div class="card-bg fuji-bg"></div>
            <div class="card-content">
              <h3>Mount Fuji</h3>
              <p>An ultra-smooth stratovolcano touching sakura skies.</p>
            </div>
          </div>
        </div>

        <div class="controls-hint">MOVEMENT: WASD &nbsp;•&nbsp; B-HOP: MOUSE WHEEL &nbsp;•&nbsp; LOOK: MOUSE</div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
